name: Dependabot auto-merge

# Self-contained auto-merge for Dependabot PRs (no dependency on any upstream
# org reusable workflow). Enables GitHub native auto-merge, so a PR merges only
# AFTER the required status checks pass. Requires, in repo settings:
#   - Settings → General → "Allow auto-merge" enabled
#   - a branch protection rule on `main` with at least one required status check
# Policy: auto-merge patch + minor bumps (this covers virtually all security
# patches); major bumps are left open for manual review.

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge (patch, minor, security; skip majors)
        if: ${{ steps.meta.outputs.update-type != 'version-update:semver-major' }}
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
